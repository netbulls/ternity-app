name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # ubuntu-latest ships with Docker, which @ternity/api integration tests need:
    # they spin up an ephemeral Postgres via Testcontainers (no `services:` block
    # required — Testcontainers manages the container itself).
    steps:
      - uses: actions/checkout@v4

      # Reads the pinned version from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @ternity/api imports @ternity/shared through its built dist (package "exports"),
      # so the shared package must be compiled before the api tests run.
      - name: Build @ternity/shared
        run: pnpm --filter @ternity/shared build

      - name: Run tests
        run: pnpm -r test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Informational: print the full advisory report on every run so regressions are
      # visible in the logs. Never fails the build (the gate below decides pass/fail).
      - name: Dependency audit (report)
        run: pnpm audit --audit-level moderate || true

      # Gate: fail on HIGH (and critical) advisories. The earlier `high` backlog was
      # cleared — direct deps bumped (fastify, drizzle-orm, vite) and transitive ones
      # pinned via pnpm overrides in the root package.json. Remaining advisories are
      # `moderate` (mostly dev/build tooling); revisit if they escalate.
      - name: Dependency audit (gate — high)
        run: pnpm audit --audit-level high
